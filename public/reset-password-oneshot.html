<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réinitialiser ton mot de passe • MyAiCrush</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #070814;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: linear-gradient(145deg, #171829, #10101d);
      border-radius: 16px;
      padding: 24px 20px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(221, 77, 157, 0.25);
    }
    .logo {
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 4px;
      color: #ff4fa3;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: #c3c4d9;
      margin-bottom: 18px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #2b2c3f;
      background: #0d0e1a;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #ff4fa3;
      box-shadow: 0 0 0 1px rgba(255, 79, 163, 0.6);
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #ff4fa3, #ff7ac5);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .message {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
    }
    .message.success {
      color: #7bd88f;
    }
    .message.error {
      color: #ff8f9b;
    }
    .back-link {
      margin-top: 16px;
      font-size: 12px;
      text-align: center;
      color: #c3c4d9;
    }
    .back-link a {
      color: #ff4fa3;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">MyAiCrush</div>
    <div class="subtitle">Choisis ton nouveau mot de passe.</div>

    <form id="resetForm">
      <label for="password">Nouveau mot de passe</label>
      <input type="password" id="password" required minlength="6" />

      <label for="confirm" style="margin-top:10px;">Confirme le mot de passe</label>
      <input type="password" id="confirm" required minlength="6" />

      <button type="submit" id="submitBtn">Mettre à jour</button>
      <div id="message" class="message"></div>
    </form>

    <div class="back-link" id="backLink" style="display:none;">
      <a href="profile.html">Retour à la connexion</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    const token = params.get('token');
    const messageEl = document.getElementById('message');
    const backLink = document.getElementById('backLink');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('resetForm');

    // Vérification du lien
    if (!email || !token) {
      messageEl.textContent = "Lien de réinitialisation invalide ou incomplet.";
      messageEl.classList.add('error');
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageEl.textContent = "";
      messageEl.className = "message";
      submitBtn.disabled = true;

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        messageEl.textContent = "Les mots de passe ne correspondent pas.";
        messageEl.classList.add('error');
        submitBtn.disabled = false;
        return;
      }

      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, newPassword: password })
        });

        const data = await res.json();

        if (res.ok) {
          messageEl.textContent = data.message || "Mot de passe mis à jour avec succès.";
          messageEl.classList.add('success');
          backLink.style.display = 'block';
          form.querySelectorAll('input').forEach(i => i.disabled = true);
        } else {
          messageEl.textContent = data.message || "Erreur lors de la mise à jour.";
          messageEl.classList.add('error');
        }
      } catch (err) {
        console.error(err);
        messageEl.textContent = "Erreur serveur. Réessaie dans un instant.";
        messageEl.classList.add('error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>

  <script>
    if (!navigator.language?.startsWith("fr")) {
      document.querySelector(".subtitle").textContent = "Choose your new password.";
      document.querySelector('label[for="password"]').textContent = "New password";
      document.querySelector('label[for="confirm"]').textContent = "Confirm password";
      document.getElementById("submitBtn").textContent = "Update";
      document.querySelector(".back-link a").textContent = "Back to login";
      document.title = "Reset password \u2022 MyAiCrush";

      const messageEl = document.getElementById("message");
      const origText = messageEl.textContent;
      if (origText.includes("invalide ou incomplet")) {
        messageEl.textContent = "Invalid or incomplete reset link.";
      }

      const form = document.getElementById("resetForm");
      const origSubmit = form.onsubmit;
      form.addEventListener("submit", () => {
        const poll = setInterval(() => {
          const txt = messageEl.textContent.trim();
          if (!txt) return;
          clearInterval(poll);
          if (txt.includes("ne correspondent pas")) {
            messageEl.textContent = "Passwords don't match.";
          } else if (txt.includes("Erreur serveur")) {
            messageEl.textContent = "Server error. Please try again.";
          } else if (txt.includes("Erreur")) {
            messageEl.textContent = "An error occurred. Please try again.";
          }
        }, 100);
      }, true);
    }
  </script>

</body>
</html>
