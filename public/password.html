<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/images/market/logo.webp" type="image/jpeg">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Google Analytics (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FJ5S0H9B1R"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {

    gtag('js', new Date());

<body>

  <!-- Main content -->
  <div class="container">
    <h1 class="p-title">Change your password</h1>

    <!-- Change password form -->
    <form id="change-password-form">
      <label for="current-password">Current password:</label>
      <input type="password" id="current-password" placeholder="Enter your current password" autocomplete="current-password" required><br><br>

      <label for="new-password">New password:</label>
      <input type="password" id="new-password" placeholder="Enter your new password" autocomplete="new-password" required><br><br>

      <label for="confirm-password">Confirm new password:</label>
      <input type="password" id="confirm-password" placeholder="Confirm your new password" autocomplete="new-password" required><br><br>

      <button class="button" type="submit" id="change-password-button">Save</button>
    </form>

    <br>
    <p>
      <!-- <a href="#" id="forgot-password-link" class="forgot-password-link">Forgot Password?</a> -->
    </p>
    <!-- <a href="profile.html" class="button">Back to Profile</a> -->
  </div>


  <script type="module" src="/scripts/i18n-password.js"></script>
  <script type="module" src="./scripts/password.js"></script>
  <script type="module" src="/scripts/menu-loader.js"></script>
  <script type="module" src="/scripts/i18n-menu.js"></script>
</body>
</html>
