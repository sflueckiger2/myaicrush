<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin</title>
  <style>
    :root {
      --bg: #0a0a14;
      --card: rgba(22, 22, 40, 0.9);
      --accent: #7c3aed;
      --accent2: #f472b6;
      --green: #34d399;
      --yellow: #fbbf24;
      --blue: #60a5fa;
      --red: #ef4444;
      --text: #e8e8f0;
      --dim: #6b6b88;
      --border: rgba(124, 58, 237, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, var(--bg) 0%, #140a1e 40%, #0e0a18 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .app { max-width: 900px; margin: 0 auto; padding: 40px 20px 80px; }
    .app.hidden { display: none; }
    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 4px; }
    .subtitle { text-align: center; color: var(--dim); font-size: 0.82rem; margin-bottom: 30px; }
    .nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .nav a { color: var(--dim); text-decoration: none; font-size: 0.82rem; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); transition: all .2s; }
    .nav a:hover, .nav a.active { color: var(--accent2); border-color: var(--accent2); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px;
      text-align: center;
    }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--accent2); }
    .stat-card .label { font-size: 0.72rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .stat-card.green .value { color: var(--green); }
    .stat-card.blue .value { color: var(--blue); }
    .stat-card.yellow .value { color: var(--yellow); }
    .stat-card.red .value { color: var(--red); }
    .section { margin-bottom: 24px; }
    .section h2 { font-size: 1rem; margin-bottom: 12px; color: var(--accent2); }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; color: var(--dim); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; }
    td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .login-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 1000; }
    .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 2rem; max-width: 380px; text-align: center; }
    .login-box h2 { margin-bottom: 0.5rem; font-size: 1.2rem; }
    .login-box p { color: var(--dim); font-size: 0.82rem; margin-bottom: 1rem; }
    .login-box .err { color: var(--red); font-size: 0.8rem; display: none; margin-top: 0.5rem; }
    .refresh-info { text-align: center; color: var(--dim); font-size: 0.75rem; margin-bottom: 16px; }
    .loading { text-align: center; color: var(--dim); padding: 60px 0; font-size: 0.9rem; }
    .btn-detail { background: rgba(124,58,237,0.15); color: var(--accent2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; transition: all .15s; }
    .btn-detail:hover { background: rgba(124,58,237,0.3); border-color: var(--accent2); }
    .btn-detail:disabled { opacity: 0.35; cursor: not-allowed; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 760px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 16px; }
    .modal-head h3 { font-size: 1rem; color: var(--accent2); }
    .modal-head .meta { color: var(--dim); font-size: 0.75rem; margin-top: 4px; }
    .modal-close { background: none; border: none; color: var(--dim); font-size: 1.4rem; cursor: pointer; }
    .modal-close:hover { color: var(--text); }
    .badge-source { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-stored { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .badge-reconstructed { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
  </style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2>Admin Dashboard</h2>
    <p>Sign in with your Google account on MyAiCrush first, then refresh this page.</p>
    <p class="err" id="login-err">Access denied. You must be logged in with an admin account.</p>
  </div>
</div>

<div class="app hidden" id="app">
  <h1>MyAiCrush Dashboard</h1>
  <p class="subtitle">Email & user metrics</p>
  <div class="nav">
    <a href="admin-tickets.html">Tickets</a>
    <a href="admin-email.html">Daily Email</a>
    <a href="admin-dashboard.html" class="active">Dashboard</a>
  </div>
  <div class="refresh-info" id="refresh-info"></div>
  <div id="content"><div class="loading">Loading stats...</div></div>
</div>

<div class="modal-overlay" id="sales-modal">
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <h3 id="sales-modal-title">Campaign sales</h3>
        <div class="meta" id="sales-modal-meta"></div>
      </div>
      <button class="modal-close" onclick="document.getElementById('sales-modal').classList.remove('show')">&times;</button>
    </div>
    <div id="sales-modal-body"><div class="loading">Loading sales...</div></div>
  </div>
</div>

<script>
(function() {
  const loginOverlay = document.getElementById("login-overlay");
  const appDiv = document.getElementById("app");
  const loginErr = document.getElementById("login-err");
  const content = document.getElementById("content");
  const refreshInfo = document.getElementById("refresh-info");
  let adminEmail = "";

  (async function init() {
    try {
      const user = JSON.parse(localStorage.getItem("user"));
      if (!user || !user.email) { loginErr.style.display = "block"; return; }

      const res = await fetch("/api/admin/dashboard-stats", {
        headers: { "x-admin-email": user.email }
      });
      if (!res.ok) { loginErr.style.display = "block"; return; }

      adminEmail = user.email;
      loginOverlay.style.display = "none";
      appDiv.classList.remove("hidden");

      const data = await res.json();
      renderDashboard(data);
    } catch (e) {
      loginErr.style.display = "block";
    }
  })();

  function renderDashboard(d) {
    const ts = new Date(d.timestamp);
    refreshInfo.textContent = `Last updated: ${ts.toLocaleString()}`;

    content.innerHTML = `
      <div class="section">
        <h2>Users</h2>
        <div class="grid">
          <div class="stat-card"><div class="value">${d.users.total}</div><div class="label">Total users</div></div>
          <div class="stat-card green"><div class="value">${d.users.premium}</div><div class="label">Premium</div></div>
          <div class="stat-card blue"><div class="value">${d.users.newLast24h}</div><div class="label">New (24h)</div></div>
          <div class="stat-card blue"><div class="value">${d.users.newLast7d}</div><div class="label">New (7d)</div></div>
          <div class="stat-card"><div class="value">${d.users.newLast30d}</div><div class="label">New (30d)</div></div>
        </div>
      </div>

      <div class="section">
        <h2>Daily Emails</h2>
        <div class="grid">
          <div class="stat-card green"><div class="value">${d.dailyEmails.eligible}</div><div class="label">Active list</div></div>
          <div class="stat-card yellow"><div class="value">${d.dailyEmails.sentLast24h}</div><div class="label">Sent (24h)</div></div>
          <div class="stat-card"><div class="value">${d.dailyEmails.sentLast7d}</div><div class="label">Sent (7d)</div></div>
          <div class="stat-card red"><div class="value">${d.dailyEmails.unsubscribed}</div><div class="label">Unsubscribed</div></div>
          <div class="stat-card red"><div class="value">${d.dailyEmails.autoCleaned}</div><div class="label">Auto-cleaned</div></div>
        </div>
      </div>

      <div class="section">
        <h2>Engagement</h2>
        <div class="grid">
          <div class="stat-card green"><div class="value">${d.engagement.openedLast24h}</div><div class="label">Opens (24h)</div></div>
          <div class="stat-card green"><div class="value">${d.engagement.openRate24h}%</div><div class="label">Open rate (24h)</div></div>
          <div class="stat-card blue"><div class="value">${d.engagement.openedLast7d}</div><div class="label">Opens (7d)</div></div>
          <div class="stat-card blue"><div class="value">${d.engagement.openRate7d}%</div><div class="label">Open rate (7d)</div></div>
          <div class="stat-card yellow"><div class="value">${d.engagement.clickedLast24h}</div><div class="label">Clicks (24h)</div></div>
          <div class="stat-card yellow"><div class="value">${d.engagement.clickRate24h}%</div><div class="label">Click rate (24h)</div></div>
          <div class="stat-card"><div class="value">${d.engagement.clickedLast7d}</div><div class="label">Clicks (7d)</div></div>
          <div class="stat-card"><div class="value">${d.engagement.clickRate7d}%</div><div class="label">Click rate (7d)</div></div>
        </div>
      </div>

      <div class="section">
        <h2>Recent Signups (7d)</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Email</th><th>Lang</th><th>Date</th></tr></thead>
            <tbody>${d.recentSignups.map(u => `<tr><td>${u.email}</td><td>${u.lang || "-"}</td><td>${new Date(u.createdAt).toLocaleString()}</td></tr>`).join("")}</tbody>
          </table>
        </div>
      </div>

      <div class="section">
        <h2>Recent Email Opens (24h)</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Email</th><th>Opened at</th></tr></thead>
            <tbody>${d.recentOpens.map(u => `<tr><td>${u.email}</td><td>${new Date(u.lastEmailOpenedAt).toLocaleString()}</td></tr>`).join("")}</tbody>
          </table>
        </div>
      </div>

      <div class="section">
        <h2>📬 Email Campaigns History</h2>
        <div id="campaigns-table"><div class="loading">Loading campaigns...</div></div>
      </div>
    `;
    loadCampaigns();
  }

  async function loadCampaigns() {
    try {
      const user = JSON.parse(localStorage.getItem("user"));
      const res = await fetch("/api/admin/email-campaigns", {
        headers: { "x-admin-email": user.email }
      });
      if (!res.ok) return;
      const data = await res.json();
      const container = document.getElementById("campaigns-table");
      if (!data.campaigns || !data.campaigns.length) {
        container.innerHTML = '<p style="color:var(--dim);text-align:center;">No campaigns yet. Stats will appear after the next daily email.</p>';
        return;
      }
      const totalSent = data.campaigns.reduce((s, c) => s + (c.sentCount || 0), 0);
      const totalPurchases = data.campaigns.reduce((s, c) => s + (c.purchaseCount || 0), 0);
      const totalRevenue = data.campaigns.reduce((s, c) => s + (c.revenue || 0), 0);
      const summary = `<div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;">
        <div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);padding:10px 16px;border-radius:8px;">
          <div style="font-size:0.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;">Total Revenue</div>
          <div style="font-size:1.4rem;font-weight:700;color:var(--green);">$${totalRevenue.toFixed(0)}</div>
        </div>
        <div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);padding:10px 16px;border-radius:8px;">
          <div style="font-size:0.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;">Total Purchases</div>
          <div style="font-size:1.4rem;font-weight:700;color:var(--blue);">${totalPurchases}</div>
        </div>
        <div style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.3);padding:10px 16px;border-radius:8px;">
          <div style="font-size:0.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;">Avg $/Email Sent</div>
          <div style="font-size:1.4rem;font-weight:700;color:#a855f7;">$${totalSent > 0 ? (totalRevenue / totalSent).toFixed(3) : "0.000"}</div>
        </div>
      </div>`;
      container.innerHTML = summary + `<div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Subject</th><th>Character</th><th>Lang</th><th>Sent</th><th>Opens</th><th>Open %</th><th>Clicks</th><th>Click %</th><th>Sales</th><th>Revenue</th><th>Conv %</th><th></th></tr></thead>
        <tbody>${data.campaigns.map(c => `<tr>
          <td>${new Date(c.sentAt).toLocaleDateString()}</td>
          <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${c.subject}">${c.subject}</td>
          <td>${c.character}</td>
          <td>${c.language.toUpperCase()}</td>
          <td>${c.sentCount}</td>
          <td>${c.openCount}</td>
          <td style="color:var(--green);font-weight:600;">${c.openRate}%</td>
          <td>${c.clickCount}</td>
          <td style="color:var(--blue);font-weight:600;">${c.clickRate}%</td>
          <td style="color:#a855f7;font-weight:600;">${c.purchaseCount}</td>
          <td style="color:var(--green);font-weight:700;">$${(c.revenue || 0).toFixed(0)}</td>
          <td style="color:#f59e0b;font-weight:600;">${c.conversionRate}%</td>
          <td><button class="btn-detail" data-id="${c.id}" data-label="${c.character} ${c.language.toUpperCase()} ${new Date(c.sentAt).toLocaleDateString()}" ${(!c.purchaseCount && !c.revenue) ? "disabled title='No sale'" : ""}>Detail</button></td>
        </tr>`).join("")}</tbody>
      </table></div>`;

      container.querySelectorAll(".btn-detail").forEach(btn => {
        btn.addEventListener("click", () => showCampaignSales(btn.dataset.id, btn.dataset.label));
      });
    } catch (e) {
      const container = document.getElementById("campaigns-table");
      if (container) container.innerHTML = '<p style="color:var(--red);">Error loading campaigns</p>';
    }
  }

  async function showCampaignSales(campaignId, label) {
    const modal = document.getElementById("sales-modal");
    const body  = document.getElementById("sales-modal-body");
    const title = document.getElementById("sales-modal-title");
    const meta  = document.getElementById("sales-modal-meta");
    title.textContent = `Sales — ${label || campaignId}`;
    meta.textContent  = "";
    body.innerHTML = '<div class="loading">Loading sales...</div>';
    modal.classList.add("show");

    try {
      const user = JSON.parse(localStorage.getItem("user"));
      const res  = await fetch(`/api/admin/email-campaigns/${campaignId}/sales`, {
        headers: { "x-admin-email": user.email }
      });
      if (!res.ok) {
        body.innerHTML = '<p style="color:var(--red);">Error loading sales</p>';
        return;
      }
      const data = await res.json();
      const sourceBadge = data.source === "stored"
        ? '<span class="badge-source badge-stored">Stored</span>'
        : '<span class="badge-source badge-reconstructed">Reconstructed</span>';
      meta.innerHTML = `${sourceBadge} &nbsp; ${data.totals.purchaseCount} sale(s) · $${(data.totals.revenue || 0).toFixed(0)} stored`;

      if (!data.sales || !data.sales.length) {
        body.innerHTML = '<p style="color:var(--dim);text-align:center;padding:20px 0;">No attributed sale found for this campaign.</p>';
        return;
      }

      const computedTotal = data.sales.reduce((s, x) => s + (x.usd || 0), 0);
      const mismatch = Math.abs(computedTotal - (data.totals.revenue || 0)) > 0.01 && data.source === "reconstructed";

      body.innerHTML = `
        ${mismatch ? `<p style="color:var(--yellow);font-size:0.78rem;margin-bottom:10px;">⚠️ Reconstructed total ($${computedTotal}) differs from stored ($${data.totals.revenue || 0}). Difference can be due to refunds or out-of-window events.</p>` : ""}
        <div class="table-wrap"><table>
          <thead><tr><th>When (UTC)</th><th>Email</th><th>Product</th><th>Order</th><th style="text-align:right;">Amount</th></tr></thead>
          <tbody>${data.sales.map(s => `<tr>
            <td>${new Date(s.at).toLocaleString()}</td>
            <td>${s.email}</td>
            <td><code style="font-size:0.78rem;color:var(--accent2);">${s.productLabel || "?"}</code></td>
            <td style="color:var(--dim);font-size:0.75rem;">${s.orderId || "-"}</td>
            <td style="text-align:right;color:var(--green);font-weight:700;">$${(s.usd || 0).toFixed(0)}</td>
          </tr>`).join("")}</tbody>
          <tfoot><tr><td colspan="4" style="text-align:right;color:var(--dim);">Total</td><td style="text-align:right;color:var(--green);font-weight:700;">$${computedTotal.toFixed(0)}</td></tr></tfoot>
        </table></div>
      `;
    } catch (e) {
      body.innerHTML = '<p style="color:var(--red);">Error loading sales</p>';
    }
  }

  document.getElementById("sales-modal").addEventListener("click", (e) => {
    if (e.target.id === "sales-modal") e.target.classList.remove("show");
  });
})();
</script>
</body>
</html>
