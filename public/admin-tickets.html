<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Tickets — Admin</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a14;
      --card: rgba(22, 22, 40, 0.9);
      --surface2: #1a1a30;
      --accent: #f472b6;
      --accent2: #c026d3;
      --green: #34d399;
      --yellow: #fbbf24;
      --blue: #60a5fa;
      --red: #ef4444;
      --text: #e8e8f0;
      --dim: #6b6b88;
      --border: rgba(244, 114, 182, 0.12);
      --border-muted: rgba(255,255,255,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(160deg, var(--bg) 0%, #140a1e 40%, #0e0a18 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Login */
    .login-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 1000;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 90%; max-width: 380px;
      text-align: center;
    }
    .login-box h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    .login-box p { color: var(--dim); font-size: 0.82rem; margin-bottom: 1.5rem; }
    .login-box input {
      width: 100%;
      background: rgba(12, 12, 25, 0.95);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      margin-bottom: 1rem;
      text-align: center;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box .login-err { color: var(--red); font-size: 0.78rem; margin-bottom: 0.75rem; display: none; }
    .login-btn {
      width: 100%;
      padding: 0.7rem;
      background: linear-gradient(135deg, #f472b6, #ec4899);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }
    .login-btn:hover { opacity: 0.9; }

    /* App */
    .app { max-width: 1100px; margin: 0 auto; padding: 30px 20px 60px; }
    .app.hidden { display: none; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem;
    }
    .topbar h1 { font-size: 1.4rem; font-weight: 700; }
    .topbar .stats {
      display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
    }
    .stat-pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 0.85rem;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .stat-pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .stat-pill .dot.pending { background: var(--yellow); }
    .stat-pill .dot.in_progress { background: var(--blue); }
    .stat-pill .dot.resolved { background: var(--green); }
    .stat-pill .dot.total { background: var(--accent); }
    .logout-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.4rem 0.8rem;
      color: var(--dim); font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }
    .logout-btn:hover { color: var(--text); border-color: var(--accent); }

    /* Filters */
    .filters {
      display: flex; gap: 0.75rem; margin-bottom: 1.25rem;
      flex-wrap: wrap; align-items: center;
    }
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border-muted);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
    .search-box {
      flex: 1; min-width: 200px;
      background: var(--card);
      border: 1px solid var(--border-muted);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: #4b5563; }

    /* Ticket list */
    .ticket-list { display: flex; flex-direction: column; gap: 0; }
    .ticket-row {
      display: grid;
      grid-template-columns: 110px 1fr 140px 100px 90px;
      gap: 1rem;
      align-items: center;
      padding: 0.9rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border-muted);
      border-bottom: none;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.82rem;
    }
    .ticket-row:first-child { border-radius: 14px 14px 0 0; }
    .ticket-row:last-child { border-bottom: 1px solid var(--border-muted); border-radius: 0 0 14px 14px; }
    .ticket-row:only-child { border-radius: 14px; border-bottom: 1px solid var(--border-muted); }
    .ticket-row:hover { background: rgba(244, 114, 182, 0.04); }
    .ticket-row.selected { background: rgba(244, 114, 182, 0.08); border-color: var(--accent); }
    .ticket-row .tid { font-weight: 600; color: var(--accent); font-size: 0.78rem; font-family: monospace; }
    .ticket-row .tinfo { overflow: hidden; }
    .ticket-row .tname { font-weight: 600; font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-row .temail { color: var(--dim); font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-row .treason { color: var(--dim); font-size: 0.72rem; }
    .ticket-row .tdate { color: var(--dim); font-size: 0.72rem; text-align: right; }
    .status-badge {
      display: inline-block;
      padding: 0.22rem 0.6rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .status-pending { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .status-in_progress { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .status-resolved { background: rgba(34,197,94,0.15); color: #4ade80; }
    .status-closed { background: rgba(148,163,184,0.15); color: #94a3b8; }

    .empty-state {
      text-align: center; padding: 3rem 2rem;
      color: var(--dim);
    }
    .empty-state i { font-size: 2rem; margin-bottom: 0.75rem; display: block; }

    /* Pagination */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 0.5rem; margin-top: 1.25rem;
    }
    .page-btn {
      background: var(--card);
      border: 1px solid var(--border-muted);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--dim);
      cursor: pointer;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--text); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { font-size: 0.78rem; color: var(--dim); }

    /* Detail panel */
    .detail-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      display: none;
      align-items: center; justify-content: center;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 90%; max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
    }
    .detail-panel::-webkit-scrollbar { width: 6px; }
    .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .detail-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .detail-top h2 { font-size: 1.15rem; }
    .detail-top .tid { color: var(--accent); font-family: monospace; font-size: 0.85rem; }
    .close-btn {
      background: none; border: none;
      color: var(--dim); font-size: 1.2rem;
      cursor: pointer; padding: 0.25rem;
    }
    .close-btn:hover { color: var(--text); }
    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .detail-field label {
      display: block; font-size: 0.7rem; color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.04em;
      margin-bottom: 0.25rem; font-weight: 600;
    }
    .detail-field .val { font-size: 0.85rem; word-break: break-word; }
    .detail-desc {
      background: var(--card);
      border: 1px solid var(--border-muted);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .detail-desc label {
      display: block; font-size: 0.7rem; color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.04em;
      margin-bottom: 0.5rem; font-weight: 600;
    }
    .detail-desc p {
      font-size: 0.85rem; line-height: 1.65;
      white-space: pre-line; color: #cbd5e1;
    }
    .action-section {
      border-top: 1px solid var(--border-muted);
      padding-top: 1.5rem;
    }
    .action-section h3 {
      font-size: 0.85rem; margin-bottom: 1rem; font-weight: 600;
    }
    .action-row {
      display: flex; gap: 0.75rem; margin-bottom: 1rem;
      align-items: center; flex-wrap: wrap;
    }
    .action-row label {
      font-size: 0.75rem; color: var(--dim); font-weight: 600;
      text-transform: uppercase; min-width: 50px;
    }
    .status-select {
      background: var(--card);
      border: 1px solid var(--border-muted);
      border-radius: 8px;
      padding: 0.45rem 0.8rem;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      cursor: pointer; outline: none;
    }
    .status-select option { background: var(--bg); }
    .reply-textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border-muted);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      resize: vertical;
      min-height: 100px;
      outline: none;
    }
    .reply-textarea:focus { border-color: var(--accent); }
    .reply-textarea::placeholder { color: #4b5563; }
    .save-btn {
      padding: 0.6rem 1.5rem;
      background: linear-gradient(135deg, #f472b6, #ec4899);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 0.75rem;
    }
    .save-btn:hover { opacity: 0.9; }
    .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .save-feedback {
      display: inline-block; margin-left: 0.75rem;
      font-size: 0.78rem; color: var(--green);
    }

    @media (max-width: 700px) {
      .ticket-row {
        grid-template-columns: 1fr;
        gap: 0.35rem;
        padding: 0.75rem 1rem;
      }
      .ticket-row .tdate { text-align: left; }
      .detail-grid { grid-template-columns: 1fr; }
      .detail-panel { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2><i class="fas fa-lock"></i> Admin Access</h2>
    <p>Enter the admin password to manage support tickets.</p>
    <div class="login-err" id="login-err">Invalid password. Try again.</div>
    <input type="password" id="login-input" placeholder="Password" autocomplete="off" />
    <button class="login-btn" id="login-btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
  </div>
</div>

<!-- App -->
<div class="app hidden" id="app">

  <div class="topbar">
    <h1><i class="fas fa-ticket-alt" style="color:var(--accent)"></i> Support Tickets</h1>
    <div class="stats" id="stats"></div>
    <button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-status="all">All</button>
    <button class="filter-btn" data-status="pending">Pending</button>
    <button class="filter-btn" data-status="in_progress">In Progress</button>
    <button class="filter-btn" data-status="resolved">Resolved</button>
    <button class="filter-btn" data-status="closed">Closed</button>
    <input type="text" class="search-box" id="search-box" placeholder="Search by email, name, order..." />
  </div>

  <div id="ticket-list" class="ticket-list"></div>
  <div class="pagination" id="pagination"></div>

</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<script>
(function() {
  let token = sessionStorage.getItem("admin_token") || "";
  let currentStatus = "all";
  let currentSearch = "";
  let currentPage = 1;
  let searchTimeout;

  const loginOverlay = document.getElementById("login-overlay");
  const appDiv = document.getElementById("app");
  const loginInput = document.getElementById("login-input");
  const loginBtn = document.getElementById("login-btn");
  const loginErr = document.getElementById("login-err");
  const detailOverlay = document.getElementById("detail-overlay");
  const detailPanel = document.getElementById("detail-panel");

  if (token) {
    verifyAndInit();
  }

  loginBtn.addEventListener("click", doLogin);
  loginInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  async function doLogin() {
    const pwd = loginInput.value.trim();
    if (!pwd) return;
    loginBtn.disabled = true;
    try {
      const res = await fetch("/api/admin/tickets?limit=1", {
        headers: { "x-admin-token": pwd }
      });
      if (res.ok) {
        token = pwd;
        sessionStorage.setItem("admin_token", token);
        loginOverlay.style.display = "none";
        appDiv.classList.remove("hidden");
        loadTickets();
      } else {
        loginErr.style.display = "block";
        loginInput.value = "";
        loginInput.focus();
      }
    } catch {
      loginErr.textContent = "Connection error.";
      loginErr.style.display = "block";
    }
    loginBtn.disabled = false;
  }

  async function verifyAndInit() {
    try {
      const res = await fetch("/api/admin/tickets?limit=1", {
        headers: { "x-admin-token": token }
      });
      if (res.ok) {
        loginOverlay.style.display = "none";
        appDiv.classList.remove("hidden");
        loadTickets();
      } else {
        sessionStorage.removeItem("admin_token");
        token = "";
      }
    } catch {}
  }

  document.getElementById("logout-btn").addEventListener("click", () => {
    sessionStorage.removeItem("admin_token");
    token = "";
    appDiv.classList.add("hidden");
    loginOverlay.style.display = "flex";
    loginInput.value = "";
    loginErr.style.display = "none";
  });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentStatus = btn.dataset.status;
      currentPage = 1;
      loadTickets();
    });
  });

  document.getElementById("search-box").addEventListener("input", e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      currentSearch = e.target.value.trim();
      currentPage = 1;
      loadTickets();
    }, 350);
  });

  detailOverlay.addEventListener("click", e => {
    if (e.target === detailOverlay) closeDetail();
  });

  async function loadTickets() {
    const params = new URLSearchParams({ page: currentPage, limit: 20 });
    if (currentStatus !== "all") params.set("status", currentStatus);
    if (currentSearch) params.set("search", currentSearch);

    try {
      const res = await fetch("/api/admin/tickets?" + params, {
        headers: { "x-admin-token": token }
      });
      const data = await res.json();
      if (!data.success) return;

      renderStats(data);
      renderList(data.tickets);
      renderPagination(data);
    } catch {}
  }

  function renderStats(data) {
    document.getElementById("stats").innerHTML = `
      <span class="stat-pill"><span class="dot total"></span> ${data.total} total</span>
    `;
  }

  function renderList(tickets) {
    const container = document.getElementById("ticket-list");
    if (tickets.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>No tickets found</div>';
      return;
    }
    container.innerHTML = tickets.map(t => `
      <div class="ticket-row" data-id="${t.ticketId}">
        <span class="tid">${t.ticketId}</span>
        <div class="tinfo">
          <div class="tname">${esc(t.firstName)} ${esc(t.lastName)}</div>
          <div class="temail">${esc(t.email)} — ${esc(t.orderId)}</div>
        </div>
        <span class="treason">${formatReason(t.reason)}</span>
        <span><span class="status-badge status-${t.status}">${formatStatus(t.status)}</span></span>
        <span class="tdate">${shortDate(t.createdAt)}</span>
      </div>
    `).join("");

    container.querySelectorAll(".ticket-row").forEach(row => {
      row.addEventListener("click", () => openDetail(tickets.find(t => t.ticketId === row.dataset.id)));
    });
  }

  function renderPagination(data) {
    const container = document.getElementById("pagination");
    if (data.pages <= 1) { container.innerHTML = ""; return; }
    container.innerHTML = `
      <button class="page-btn" ${data.page <= 1 ? "disabled" : ""} onclick="window._adminPrev()"><i class="fas fa-chevron-left"></i></button>
      <span class="page-info">${data.page} / ${data.pages}</span>
      <button class="page-btn" ${data.page >= data.pages ? "disabled" : ""} onclick="window._adminNext()"><i class="fas fa-chevron-right"></i></button>
    `;
  }
  window._adminPrev = () => { currentPage = Math.max(1, currentPage - 1); loadTickets(); };
  window._adminNext = () => { currentPage++; loadTickets(); };

  function openDetail(ticket) {
    if (!ticket) return;
    const t = ticket;
    detailPanel.innerHTML = `
      <div class="detail-top">
        <div>
          <h2><i class="fas fa-ticket-alt" style="color:var(--accent)"></i> Ticket Details</h2>
          <div class="tid">${t.ticketId}</div>
        </div>
        <button class="close-btn" onclick="document.getElementById('detail-overlay').classList.remove('open')"><i class="fas fa-times"></i></button>
      </div>
      <div class="detail-grid">
        <div class="detail-field"><label>Name</label><div class="val">${esc(t.firstName)} ${esc(t.lastName)}</div></div>
        <div class="detail-field"><label>Email</label><div class="val">${esc(t.email)}</div></div>
        <div class="detail-field"><label>Phone</label><div class="val">${esc(t.phone)}</div></div>
        <div class="detail-field"><label>Order #</label><div class="val">${esc(t.orderId)}</div></div>
        <div class="detail-field"><label>Reason</label><div class="val">${formatReason(t.reason)}</div></div>
        <div class="detail-field"><label>Submitted</label><div class="val">${longDate(t.createdAt)}</div></div>
      </div>
      <div class="detail-desc">
        <label>Description</label>
        <p>${esc(t.description)}</p>
      </div>
      <div class="action-section">
        <h3>Update Ticket</h3>
        <div class="action-row">
          <label>Status</label>
          <select class="status-select" id="d-status">
            <option value="pending" ${t.status === "pending" ? "selected" : ""}>Pending</option>
            <option value="in_progress" ${t.status === "in_progress" ? "selected" : ""}>In Progress</option>
            <option value="resolved" ${t.status === "resolved" ? "selected" : ""}>Resolved</option>
            <option value="closed" ${t.status === "closed" ? "selected" : ""}>Closed</option>
          </select>
        </div>
        <label style="display:block;font-size:0.75rem;color:var(--dim);font-weight:600;text-transform:uppercase;margin-bottom:0.4rem">Reply to customer</label>
        <textarea class="reply-textarea" id="d-reply" placeholder="Write your response here... The customer will see this on their tracking page.">${t.adminReply ? esc(t.adminReply) : ""}</textarea>
        <div>
          <button class="save-btn" id="d-save" onclick="window._saveTicket('${t.ticketId}')"><i class="fas fa-check"></i> Save Changes</button>
          <span class="save-feedback" id="d-feedback"></span>
        </div>
      </div>
    `;
    detailOverlay.classList.add("open");
  }

  window._saveTicket = async (ticketId) => {
    const btn = document.getElementById("d-save");
    const feedback = document.getElementById("d-feedback");
    btn.disabled = true;
    feedback.textContent = "";
    try {
      const res = await fetch("/api/admin/tickets/" + ticketId, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "x-admin-token": token },
        body: JSON.stringify({
          status: document.getElementById("d-status").value,
          adminReply: document.getElementById("d-reply").value.trim() || null
        })
      });
      const data = await res.json();
      if (data.success) {
        feedback.textContent = "Saved!";
        feedback.style.color = "var(--green)";
        loadTickets();
      } else {
        feedback.textContent = data.error || "Error";
        feedback.style.color = "var(--red)";
      }
    } catch {
      feedback.textContent = "Connection error";
      feedback.style.color = "var(--red)";
    }
    btn.disabled = false;
  };

  function closeDetail() {
    detailOverlay.classList.remove("open");
  }

  function esc(s) {
    if (!s) return "";
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
  function formatReason(r) {
    return { refund_request: "Refund", billing_issue: "Billing", speak_to_human: "Human Agent", other: "Other" }[r] || r;
  }
  function formatStatus(s) {
    return { pending: "Pending", in_progress: "In Progress", resolved: "Resolved", closed: "Closed" }[s] || s;
  }
  function shortDate(d) {
    if (!d) return "—";
    const dt = new Date(d);
    return dt.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }
  function longDate(d) {
    if (!d) return "—";
    const dt = new Date(d);
    return dt.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" }) + " " + dt.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
  }
})();
</script>

</body>
